syntax = "proto3";

// Package payment.v1 содержит API для работы с платежами
package payment.v1;

option go_package = "github.com/AlexKostromin/microsrv/shared/pkg/proto/payment/v1;payment_v1";

// PaymentService предоставляет API для проведения платежей
service PaymentService {
  // PayOrder обрабатывает команду на оплату заказа
  rpc PayOrder(PayOrderRequest) returns (PayOrderResponse);
}

// PaymentMethod способ оплаты
enum PaymentMethod {
  // PAYMENT_METHOD_UNSPECIFIED неизвестный способ
  PAYMENT_METHOD_UNSPECIFIED = 0;
  // PAYMENT_METHOD_CARD банковская карта
  PAYMENT_METHOD_CARD = 1;
  // PAYMENT_METHOD_SBP система быстрых платежей
  PAYMENT_METHOD_SBP = 2;
  // PAYMENT_METHOD_CREDIT_CARD кредитная карта
  PAYMENT_METHOD_CREDIT_CARD = 3;
  // PAYMENT_METHOD_INVESTOR_MONEY деньги инвестора
  PAYMENT_METHOD_INVESTOR_MONEY = 4;
}

// PayOrderRequest запрос на оплату заказа
message PayOrderRequest {
  // order_uuid UUID заказа
  string order_uuid = 1;
  // user_uuid UUID пользователя
  string user_uuid = 2;
  // payment_method выбранный способ оплаты
  PaymentMethod payment_method = 3;
}

// PayOrderResponse ответ с UUID транзакции
message PayOrderResponse {
  // transaction_uuid UUID транзакции оплаты
  string transaction_uuid = 1;
}
